name: Pro Cert Radar

on:
  schedule:
    # Runs every 30 minutes to stay under the free limit for private repos
    - cron: "*/30 * * * *"
  workflow_dispatch: # This lets you press a button to test it right now

permissions:
  contents: write # Allows the bot to save the memory file

jobs:
  check-certs:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v3
      
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'
        
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install feedparser requests
        
    - name: Run Cert Checker
      env:
        EMAIL_ADDRESS: ${{ secrets.EMAIL_ADDRESS }}
        EMAIL_PASSWORD: ${{ secrets.EMAIL_PASSWORD }}
        TO_EMAIL_ADDRESS: ${{ secrets.TO_EMAIL_ADDRESS }}
      run: python checker.py
      
    - name: Commit and Push Memory File
      run: |
        git config user.name "CertRadarBot"
        git config user.email "actions@github.com"
        if [ -f "seen_links.txt" ]; then
          git add seen_links.txt
          git commit -m "Update seen links memory" || echo "No new links to commit"
          git push
        else
          echo "No new links to commit"
        fi
