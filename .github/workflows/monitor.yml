name: Pro Cert Radar v2.0

on:
  schedule:
    # Runs every 30 minutes
    - cron: "*/30 * * * *"
  workflow_dispatch: # Manual trigger button

permissions:
  contents: write  # Allows saving seen_links.json back to repo

jobs:
  check-certs:
    runs-on: ubuntu-latest

    steps:
    - name: 🔄 Checkout code
      uses: actions/checkout@v4

    - name: 🐍 Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: 📦 Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install feedparser requests beautifulsoup4

    - name: 🔍 Create seen_links.json if missing
      run: |
        if [ ! -f seen_links.json ]; then
          echo "{}" > seen_links.json
        fi

    - name: 🎯 Run Cert Radar
      env:
        EMAIL_ADDRESS: ${{ secrets.EMAIL_ADDRESS }}
        EMAIL_PASSWORD: ${{ secrets.EMAIL_PASSWORD }}
        TO_EMAIL_ADDRESS: ${{ secrets.TO_EMAIL_ADDRESS }}
      run: python checker.py

    - name: 💾 Save seen links to repo
      run: |
        git config user.name "Cert Radar Bot"
        git config user.email "bot@cert-radar.local"
        git add seen_links.json alert_log.json 2>/dev/null || true
        git diff --staged --quiet || git commit -m "🤖 Update seen links [skip ci]"
        git push || echo "Nothing to push"
